# GHCR — сборка backend, bot, frontend. Подробнее: docs/how-to-docker.md (раздел про GHCR).
#
# Триггеры: push в main или тег `v*.*.*`, ручной запуск (workflow_dispatch).
# Теги образов: см. шаг «Extract image metadata» (latest, sha-, semver на релизном теге).
#
# Образы: ghcr.io/<owner>/{ttlg-backend,ttlg-bot,ttlg-frontend}; context: корень репозитория.

name: Docker — Build & Push to GHCR

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: ${{ matrix.service }}

    runs-on: ubuntu-latest
    timeout-minutes: 120

    # packages — push в GHCR; actions — запись кэша для BuildKit (cache-to type=gha)
    permissions:
      actions: write
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image: ttlg-backend
            dockerfile: devops/backend/Dockerfile

          - service: bot
            image: ttlg-bot
            dockerfile: devops/bot/Dockerfile

          - service: frontend
            image: ttlg-frontend
            dockerfile: devops/frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Два шага: у frontend отдельный build-args (NEXT_PUBLIC_*); для Python-сервисов build-args не задаём.
      - name: Build and push (backend, bot)
        if: matrix.service != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Build and push (frontend)
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
