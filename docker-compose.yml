services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ttlg
      POSTGRES_PASSWORD: ttlg
      POSTGRES_DB: ttlg
    ports:
      - "5432:5432"
    volumes:
      - ttlg_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttlg -d ttlg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ttlg_pg_data:
